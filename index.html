<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="game-container">
      <h1>Rock Paper Scissors ✊📄✂️</h1>

      <div class="score-board">
        <p>You: <span id="human-score">0</span></p>
        <p>Computer: <span id="computer-score">0</span></p>
      </div>

      <p id="round">Round 1 of 5</p>
      <div class="buttons">
        <button data-choice="rock">✊ Rock</button>
        <button data-choice="paper">📄 Paper</button>
        <button data-choice="scissors">✂️ Scissors</button>
      </div>

      <div id="result">Make your move!</div>
      <button id="replay-btn">🔄 Play Again</button>
    </div>
  </body>
</html>
